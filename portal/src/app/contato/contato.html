<article class="max-w-6xl mx-auto bg-slate-900 rounded-[3rem] my-12 overflow-hidden shadow-2xl">
  <div class="flex flex-col lg:flex-row">
    
    <!-- Painel de Informação Lateral -->

      <p class="text-slate-400 font-light text-lg mb-12 italic">
        Utilize este canal para reportar níveis de maré ou enviar propostas de tecnologias flutuantes.
      </p>
      
      <!-- Equipe de Desenvolvimento -->
      <div class="space-y-4 pt-12 border-t border-slate-800">
        <p class="text-[10px] font-black uppercase tracking-[0.3em] text-cyan-500">Desenvolvido por:</p>
        <div class="flex flex-col gap-2">
          <div class="flex items-center gap-3 group">
            <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center font-bold text-cyan-400 group-hover:bg-cyan-500 group-hover:text-slate-900 transition-all italic">L</div>
            <span class="text-lg font-bold tracking-tight">Leonardo Ortega</span>
          </div>
          <div class="flex items-center gap-3 group">
            <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center font-bold text-cyan-400 group-hover:bg-cyan-500 group-hover:text-slate-900 transition-all italic">I</div>
            <span class="text-lg font-bold tracking-tight">Isaac</span>
          </div>
<div class="flex items-center gap-3 group">
            <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center font-bold text-cyan-400 group-hover:bg-cyan-500 group-hover:text-slate-900 transition-all italic">I</div>
            <span class="text-lg font-bold tracking-tight">Jose</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Formulário Estilizado -->
    <div class="lg:w-3/5 p-16 bg-white">
      <form class="space-y-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div class="group">
            <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1 mb-2 block group-focus-within:text-cyan-600 transition-colors">Nome do Cidadão/Org</label>
            <input type="text" placeholder="Ex: Engenharia S.A." class="w-full bg-slate-50 border-none p-5 rounded-2xl focus:ring-4 focus:ring-cyan-500/20 outline-none transition-all italic">
          </div>
          <div class="group">
            <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1 mb-2 block group-focus-within:text-cyan-600 transition-colors">Email Oficial</label>
            <input type="email" placeholder="contato@servico.gov" class="w-full bg-slate-50 border-none p-5 rounded-2xl focus:ring-4 focus:ring-cyan-500/20 outline-none transition-all italic">
          </div>
        </div>
        <div class="group">
          <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1 mb-2 block group-focus-within:text-cyan-600 transition-colors">Assunto Estratégico</label>
          <select class="w-full bg-slate-50 border-none p-5 rounded-2xl focus:ring-4 focus:ring-cyan-500/20 outline-none transition-all italic">
            <option>Migração Territorial</option>
            <option>Infraestrutura Flutuante</option>
            <option>Cultura e Tradição</option>
          </select>
        </div>
        <div class="group">
          <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1 mb-2 block group-focus-within:text-cyan-600 transition-colors">Mensagem Detalhada</label>
          <textarea rows="4" placeholder="Descreva sua solicitação..." class="w-full bg-slate-50 border-none p-5 rounded-2xl focus:ring-4 focus:ring-cyan-500/20 outline-none transition-all italic resize-none"></textarea>
        </div>
        <button class="w-full bg-slate-900 text-cyan-400 font-black py-6 rounded-2xl uppercase tracking-[0.3em] hover:bg-cyan-500 hover:text-slate-900 transition-all shadow-2xl flex items-center justify-center gap-4 group">
          Protocolar Solicitação
          <span class="group-hover:translate-x-2 transition-transform">→</span>
        </button>
